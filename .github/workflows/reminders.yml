name: Plant Demand Reminders

on:
  schedule:
    # Test cron: 11:05 AM UTC is 4:35 PM IST
    - cron: '05 11 * * *'
    # 3:00 PM IST (UTC+5:30) is 9:30 AM UTC
    - cron: '30 9 * * *'
    # 5:00 PM IST (UTC+5:30) is 11:30 AM UTC
    - cron: '30 11 * * *'
  workflow_dispatch: # Allow manual trigger

jobs:
  reminders:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'

      - name: Create .env file from secret
        shell: bash
        run: |
          echo "$CONFIG_ENV" > .env
        env:
          CONFIG_ENV: ${{ secrets.CONFIG_ENV }}

      - name: Create contacts.json from secret
        shell: bash
        run: |
          mkdir -p plant_data
          echo "$CONTACTS_JSON" > plant_data/contacts.json
        env:
          CONTACTS_JSON: ${{ secrets.CONTACTS_JSON }}

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Run Normal Reminder (3 PM IST)
        if: github.event.schedule == '30 9 * * *' || github.event_name == 'workflow_dispatch'
        run: python scripts/send_daily_reminders.py

      - name: Run Missing Data Reminder (5 PM IST)
        if: github.event.schedule == '30 11 * * *' || github.event_name == 'workflow_dispatch'
        run: python scripts/send_missing_reminders.py
